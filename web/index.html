<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Student Performance Predictor</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">EduAI.</div>
            <div class="nav-links">
                <a href="#" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem;">Documentation</a>
            </div>
        </header>

        <section class="hero">
            <div class="hero-content">
                <h1>Predict Your <span style="color: var(--accent)">Success</span> with AI.</h1>
                <p>Unlock data-driven insights into academic performance. Our machine learning model analyzes your habits to predict your exam outcomes early.</p>
                
                <div class="glass-card">
                    <form id="prediction-form" class="grid-form">
                        <div class="input-group">
                            <label for="study-hours">Study Hours (Daily)</label>
                            <input type="number" id="study-hours" placeholder="e.g. 8.5" step="0.1" required>
                        </div>
                        <div class="input-group">
                            <label for="attendance">Attendance (%)</label>
                            <input type="number" id="attendance" placeholder="e.g. 95" step="0.1" required>
                        </div>
                        <div class="input-group">
                            <label for="prev-marks">Previous Marks (%)</label>
                            <input type="number" id="prev-marks" placeholder="e.g. 88" step="0.1" required>
                        </div>
                        <div class="input-group">
                            <label for="assignments">Assignments Submitted</label>
                            <input type="number" id="assignments" placeholder="e.g. 10" step="1" required>
                        </div>
                        <div class="input-group">
                            <label for="internet">Internet Usage (h)</label>
                            <input type="number" id="internet" placeholder="e.g. 2.0" step="0.1" required>
                        </div>
                        <div class="input-group">
                            <label for="family">Family Support</label>
                            <select id="family" required>
                                <option value="1">Yes</option>
                                <option value="0">No</option>
                            </select>
                        </div>
                        <button type="submit" class="btn-predict">Analyze & Predict Results</button>
                    </form>

                    <div id="result-overlay" class="result-container">
                        <p style="color: var(--text-muted); margin-bottom: 0.5rem; font-size: 0.9rem;">AI ANALYSIS COMPLETE</p>
                        <div id="result-badge" class="result-badge">---</div>
                        <p id="result-message" style="font-size: 0.9rem;"></p>
                    </div>
                </div>
            </div>

            <div class="hero-img">
                <img src="hero_image.png" alt="Student AI Analysis illustration">
            </div>
        </section>

        <footer style="margin-top: 6rem; text-align: center; color: var(--text-muted); font-size: 0.8rem; padding-bottom: 2rem;">
            <p>&copy; 2026 EduAI Analytics. Powered by Machine Learning.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
